<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vase in Ovaler form</title>
  <link rel="icon" type="image/png" href="../../logo.png">

  <style>
    body { font-family: Arial, sans-serif; margin: 20px; }

    button {
      padding:10px 16px;
      background:#ab057c; 
      color:white; 
      border:none; 
      border-radius:8px; 
      cursor:pointer;
    }

    .content-wrapper { 
      display: flex; 
      gap: 20px; 
      margin-top: 20px; 
      flex-wrap: wrap; 
    }

    .bild-galerie {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      flex: 2;
    }

    .bild-galerie img { 
      width: 100%; 
      height: auto; 
      border-radius: 10px; 
    }

    /* ---------------- TEXTBOX STYLING ---------------- */
    .text-box {                       
      flex: 1;                        
      border: 1px solid #ccc;         
      padding: 15px;                  
      border-radius: 10px;            
      height: fit-content;            
      transition: all 0.3s ease;      
      order: 2;                       
    }

    /* Instagram Icon */
    .insta-icon { 
      position: fixed; 
      bottom: 20px; 
      right: 20px; 
      width: 60px; 
      height: 60px; 
      z-index: 9999; 
    }
    .insta-icon img { 
      width: 100%; 
      height: 100%; 
      border-radius: 50%; 
      transition: 0.2s ease; 
    }
    .insta-icon img:hover { 
      transform: scale(1.1); 
      opacity: 0.9; 
    }

    /* Mobile */
    @media (max-width: 900px) {
      .content-wrapper { flex-direction: column; }
      .bild-galerie { grid-template-columns: 1fr; }
      .text-box { order: -1; margin-bottom: 20px; }
    }

    /* Klasse zum Verstecken der Textbox */
    .hide-box { display: none !important; }  
  </style>
</head>

<body>

<button onclick="window.location.href='../../index.html'">Zurück</button>

<div class="content-wrapper" id="contentWrapper">
  <div class="bild-galerie">
    <img src="./DoubleMain.jpeg" alt="Vase 1 Bild 1">
    <img src="./DoubleSub1.jpeg" alt="Vase 1 Bild 2">
    <img src="./DoubleSub2.jpeg" alt="Vase 1 Bild 3">
  </div>
</div>

<a href="https://www.instagram.com/_lebe_17?utm_source=qr&igsh=azZneGp1ZGZ1dWNn" target="_blank" class="insta-icon">
  <img src="https://cdn-icons-png.flaticon.com/512/2111/2111463.png" alt="Instagram" />
</a>

<script>
  function createTextBox(id, title, content) {
    const wrapper = document.getElementById('contentWrapper');  
    const box = document.createElement('div');
    box.className = 'text-box';
    box.id = id;

    box.innerHTML = `
      <h2>${title}</h2>
      <p>${content}</p>
    `;

    wrapper.appendChild(box);

    window.addEventListener('scroll', () => {
      if (window.innerWidth <= 900) {
        if (window.pageYOffset > 50) {
          box.classList.add('hide-box');
        } else {
          box.classList.remove('hide-box');
        }
      } else {
        box.classList.remove('hide-box');
      }
    });

    window.addEventListener('resize', () => {
      if (window.innerWidth > 900) {
        box.classList.remove('hide-box');
      }
    });
  }

  createTextBox(
    'textBox1',
    'Informationen zur Vase',
    'Die Vase inklusive praktischem Reagenzglas ist 10 cm hoch und in matt-schwarz, matt-weiß, matt-grau sowie matt-beige erhältlich.'
  );

</script>

<footer style="text-align: center; padding: 20px; margin-top: 50px; border-top: 1px solid #eee; font-family: sans-serif;">
    <p>&copy; 2026 LeBe</p>

    <a href="../../Impressum/index.html" style="text-decoration: none; color: #555; margin: 0 10px;">Impressum</a>
    <a href="../../Datenschutz/index.html" style="text-decoration: none; color: #555; margin: 0 10px;">Datenschutz</a>

    <p style="font-size: 0.8em; color: #888; margin-top: 10px;">
        Bestellanfragen bitte per Direktnachricht via 
        <a href="https://www.instagram.com/_lebe_17?utm_source=qr&igsh=azZneGp1ZGZ1dWNn" target="_blank" style="color: #e1306c;">Instagram</a> 
        oder per WhatsApp/Nachricht an: 
        
        <span id="phone">+49 1578 9640214</span>
        <button onclick="copyPhone()" style="margin-left:5px; cursor:pointer;">Nummer Kopieren</button>
    </p>
</footer>

<script>
function copyPhone() {
    const phone = document.getElementById("phone").innerText;
    navigator.clipboard.writeText(phone);
}
</script>

</body>
</html>
